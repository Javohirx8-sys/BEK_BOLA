<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA | Parkent Smart City</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sos-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .card-active:active { transform: scale(0.95); transition: 0.1s; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col">
    <header class="bg-blue-600 p-8 text-white text-center rounded-b-[40px] shadow-2xl">
        <h1 class="text-3xl font-black tracking-tighter">BEK_BOLA</h1>
        <p class="text-blue-100 text-sm mt-1">Parkent tumani aqlli yordamchisi</p>
    </header>

    <main class="p-6 max-w-md mx-auto flex-grow w-full">
        <div id="status" class="hidden bg-blue-100 text-blue-700 p-4 rounded-2xl text-center mb-6 font-bold animate-pulse border-2 border-blue-200">
            ⏳ Amaliyot bajarilmoqda...
        </div>

        <button onclick="myLocation()" class="w-full bg-white border-2 border-blue-600 text-blue-600 p-5 rounded-2xl font-black mb-8 shadow-sm card-active flex items-center justify-center gap-2">
            📍 MENING JOYLASHUVIM
        </button>

        <div class="grid grid-cols-2 gap-5">
            <div onclick="triggerAlert('SOS')" class="sos-btn bg-red-600 text-white p-8 rounded-[32px] text-center cursor-pointer shadow-xl card-active">
                <span class="text-5xl">🆘</span><br><b class="text-xl block mt-2">SOS</b>
            </div>
            <div onclick="triggerAlert('TEZ_YORDAM')" class="bg-white border-4 border-blue-600 text-blue-600 p-8 rounded-[32px] text-center cursor-pointer shadow-md card-active">
                <span class="text-5xl">🚑</span><br><b class="text-lg block mt-2 uppercase">Tez yordam</b>
            </div>
            <div onclick="findNear('gas+station')" class="bg-white p-6 rounded-3xl text-center shadow-sm border border-gray-100 card-active cursor-pointer">
                <span class="text-3xl font-bold">⛽️</span><br><span class="text-gray-600 font-bold">Yoqilg'i</span>
            </div>
            <div onclick="findNear('restaurant')" class="bg-white p-6 rounded-3xl text-center shadow-sm border border-gray-100 card-active cursor-pointer">
                <span class="text-3xl font-bold">🍽</span><br><span class="text-gray-600 font-bold">Ovqatlanish</span>
            </div>
        </div>
    </main>

    <script>
        const FIREBASE_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";

        async function triggerAlert(type) {
            if (!confirm("Haqiqatan ham yordam so'ramoqchimisiz?")) return;
            const statusDiv = document.getElementById("status");
            statusDiv.classList.remove("hidden");
            statusDiv.innerText = "⏳ Joylashuv aniqlanmoqda...";

            navigator.geolocation.getCurrentPosition(async (p) => {
                statusDiv.innerText = "🚀 Ma'lumot yuborilmoqda...";
                const payload = {
                    type: type,
                    lat: p.coords.latitude,
                    lon: p.coords.longitude,
                    time: new Date().toLocaleString()
                };

                try {
                    const res = await fetch(FIREBASE_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (res.ok) {
                        alert("✅ Yuborildi! Yordam yo'lga chiqdi.");
                        if (type === 'TEZ_YORDAM') window.location.href = "tel:103";
                    } else {
                        alert("❌ Xato: Server qabul qilmadi.");
                    }
                } catch (e) {
                    alert("❌ Internet xatosi! Aloqani tekshiring.");
                } finally {
                    statusDiv.classList.add("hidden");
                }
            }, (err) => {
                statusDiv.classList.add("hidden");
                alert("❌ GPS Xatosi: Joylashuvga ruxsat bering!");
            }, { enableHighAccuracy: true });
        }

        function myLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                window.location.href = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            });
        }

        function findNear(query) {
            navigator.geolocation.getCurrentPosition(p => {
                window.location.href = `https://www.google.com/maps/search/${query}/@${p.coords.latitude},${p.coords.longitude},15z`;
            }, () => {
                window.location.href = `https://www.google.com/maps/search/${query}+Parkent`;
            });
        }
    </script>
</body>
</html>
