<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkent Turizm Yordamchisi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f8f9fa; color: #333; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .lang-select { position: absolute; right: 10px; top: 15px; background: #34495e; color: white; border: 1px solid #7f8c8d; border-radius: 5px; padding: 5px; }
        
        .container { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 80px; }
        
        .btn-item { 
            background: white; border-radius: 15px; padding: 20px; text-align: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s;
        }
        .btn-item:active { transform: scale(0.95); }
        .btn-item i { font-size: 40px; margin-bottom: 10px; }
        
        /* Maxsus ranglar */
        .sos { grid-column: span 2; background: #e74c3c; color: white; }
        .med { border-top: 5px solid #27ae60; }
        .fuel { border-top: 5px solid #f1c40f; }
        .wc { border-top: 5px solid #3498db; }
        .food { border-top: 5px solid #e67e22; }
        .voice { grid-column: span 2; background: #9b59b6; color: white; }
        
        h2 { font-size: 18px; margin: 0; }
        .loc-info { text-align: center; font-size: 12px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h3 style="margin:0">Parkent Travel 🏔</h3>
    <select class="lang-select">
        <option>O'zbek</option>
        <option>English</option>
        <option>Русский</option>
    </select>
</header>

<div class="loc-info">📍 Sizning joylashuvingiz nazoratda</div>

<div class="container">
    <button class="btn-item sos" onclick="sendHelp('🆘 SOS')">
        <i>🆘</i> <h2>SOS</h2>
    </button>
    
    <button class="btn-item med" onclick="sendHelp('🚑 Tez yordam')">
        <i>🚑</i> <h2>Tez yordam</h2>
    </button>
    
    <button class="btn-item fuel" onclick="sendHelp('⛽️ Yoqilg‘i')">
        <i>⛽️</i> <h2>Yoqilg‘i</h2>
    </button>
    
    <button class="btn-item wc" onclick="sendHelp('🚻 Hojatxona')">
        <i>🚻</i> <h2>Hojatxona</h2>
    </button>
    
    <button class="btn-item food" onclick="sendHelp('🍽 Ovqatlanish')">
        <i>🍽</i> <h2>Ovqatlanish</h2>
    </button>
    
    <button class="btn-item voice" onclick="sendHelp('🎙 Ovozli yordam')">
        <i>🎙</i> <h2>Ovozli yordam</h2>
    </button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwhY9eF8gIO5Ew9MaYmzSbfKUs0wByOAM",
        authDomain: "bek-bola.firebaseapp.com",
        databaseURL: "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bek-bola",
        appId: "1:617804928629:web:4402d65810cf3d30810a3c"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function sendHelp(type) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(position => {
                database.ref('chaqiruvlar/').push({
                    turi: type,
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    vaqt: new Date().toLocaleTimeString()
                }).then(() => {
                    alert(type + " uchun so'rovingiz qabul qilindi!");
                });
            }, () => {
                alert("Joylashuvingizni aniqlab bo'lmadi. GPS yoqilganini tekshiring.");
            });
        }
    }
</script>
</body>
</html>
