<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA | Parkent Smart City</title>
    <style>
        :root { --blue: #0a5cff; --red: #ff3b3b; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #333; transition: 0.3s; }
        header { background: linear-gradient(135deg, var(--blue), #0041c2); color: white; padding: 25px 15px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        select, button { width: 100%; padding: 15px; margin-top: 10px; font-size: 16px; border-radius: 15px; border: 1px solid #ddd; outline: none; transition: 0.3s; cursor: pointer; }
        button { background: var(--blue); color: white; border: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 25px; }
        .card { background: white; border-radius: 20px; padding: 25px 10px; text-align: center; box-shadow: 0 5px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card:active { transform: scale(0.92); }
        .sos { background: var(--red); color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }
        #status-msg { margin-top: 15px; font-weight: bold; color: var(--blue); display: none; text-align: center; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h2 id="h-title">BEK_BOLA</h2>
    <p id="h-sub">Parkent tumani aqlli yordamchisi</p>
</header>

<div class="container">
    <label id="l-select-lang">Tilni tanlang:</label>
    <select id="langSelect" onchange="changeLanguage()">
        <option value="uz">O‘zbekcha</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>

    <div id="status-msg">⏳ Kuting...</div>

    <button id="btn-loc" onclick="handleAction('MY_LOCATION')">📍 Mening joylashuvim</button>

    <div class="grid">
        <div class="card sos" onclick="handleAction('SOS')">🆘<br><b id="c-sos">SOS</b></div>
        <div class="card" onclick="handleAction('TEZ_YORDAM')" style="border: 2px solid var(--blue);">🚑<br><b id="c-amb">Tez yordam</b></div>
        <div class="card" onclick="handleAction('FUEL')">⛽️<br><span id="c-fuel">Yoqilg‘i</span></div>
        <div class="card" onclick="handleAction('TOILET')">🚻<br><span id="c-wc">Hojatxona</span></div>
        <div class="card" onclick="handleAction('FOOD')">🍽<br><span id="c-food">Ovqatlanish</span></div>
        <div class="card" onclick="handleAction('VOICE')">🎙<br><span id="c-voice">Ovozli yordam</span></div>
    </div>

    <div class="footer">© 2026 BEK_BOLA | Parkent Smart System</div>
</div>

<script>
    const dbURL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app";

    const langData = {
        uz: { title: "BEK_BOLA", sub: "Parkent tumani aqlli yordamchisi", lLang: "Tilni tanlang:", bLoc: "📍 Mening joylashuvim", sos: "SOS", amb: "Tez yordam", fuel: "Yoqilg‘i", wc: "Hojatxona", food: "Ovqatlanish", voice: "Ovozli yordam", wait: "⏳ Aniqlanmoqda, kuting...", sent: "Xabar yuborildi!", err: "GPS ruxsatini yoqing!", vText: "Sizga qanday yordam bera olaman?" },
        ru: { title: "БЕК_БОЛА", sub: "Умный помощник Паркента", lLang: "Выберите язык:", bLoc: "📍 Моё местоположение", sos: "SOS", amb: "Скорая помощь", fuel: "Заправка", wc: "Туалет", food: "Питание", voice: "Голосовая помощь", wait: "⏳ Определяем, подождите...", sent: "Сообщение отправлено!", err: "Включите доступ к GPS!", vText: "Чем я могу вам помочь?" },
        en: { title: "BEK_BOLA", sub: "Parkent Smart Assistant", lLang: "Select language:", bLoc: "📍 My Location", sos: "SOS", amb: "Ambulance", fuel: "Fuel", wc: "Toilet", food: "Food", voice: "Voice Help", wait: "⏳ Detecting, please wait...", sent: "Message sent!", err: "Enable GPS access!", vText: "How can I help you?" }
    };

    function changeLanguage() {
        const l = langData[document.getElementById("langSelect").value];
        document.getElementById("h-title").innerText = l.title;
        document.getElementById("h-sub").innerText = l.sub;
        document.getElementById("l-select-lang").innerText = l.lLang;
        document.getElementById("btn-loc").innerText = l.bLoc;
        document.getElementById("c-sos").innerText = l.sos;
        document.getElementById("c-amb").innerText = l.amb;
        document.getElementById("c-fuel").innerText = l.fuel;
        document.getElementById("c-wc").innerText = l.wc;
        document.getElementById("c-food").innerText = l.food;
        document.getElementById("c-voice").innerText = l.voice;
    }

    async function handleAction(type) {
        const l = langData[document.getElementById("langSelect").value];
        const status = document.getElementById("status-msg");
        
        if (type === 'VOICE') {
            const msg = new SpeechSynthesisUtterance(l.vText);
            msg.lang = document.getElementById("langSelect").value === 'uz' ? 'ru-RU' : document.getElementById("langSelect").value === 'ru' ? 'ru-RU' : 'en-US';
            window.speechSynthesis.speak(msg);
            alert(l.vText);
            return;
        }

        status.innerText = l.wait;
        status.style.display = "block";

        if (!navigator.geolocation) {
            alert("GPS Error");
            status.style.display = "none";
            return;
        }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            let targetUrl = "";

            if (type === 'SOS' || type === 'TEZ_YORDAM') {
                const payload = { type, lat, lon, time: new Date().toLocaleString() };
                try {
                    await fetch(`${dbURL}/alerts.json`, { method: 'POST', body: JSON.stringify(payload) });
                    alert(l.sent);
                    if (type === 'TEZ_YORDAM') window.location.href = "tel:103";
                } catch (e) { alert("Network Error"); }
            } else if (type === 'MY_LOCATION') {
                targetUrl = `https://www.google.com{lat},${lon}`;
            } else if (type === 'FUEL') {
                targetUrl = `https://www.google.com{lat},${lon},15z`;
            } else if (type === 'TOILET') {
                targetUrl = `https://www.google.com{lat},${lon},15z`;
            } else if (type === 'FOOD') {
                targetUrl = `https://www.google.com{lat},${lon},15z`;
            }

            status.style.display = "none";
            if (targetUrl) window.location.assign(targetUrl);
            
        }, () => {
            alert(l.err);
            status.style.display = "none";
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
