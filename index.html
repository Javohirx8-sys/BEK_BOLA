<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA | Parkent</title>
    <style>
        :root { --blue: #0a5cff; --red: #ff3b3b; --bg: #f0f2f5; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); text-align: center; }
        header { background: linear-gradient(135deg, var(--blue), #0041c2); color: white; padding: 25px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        button, select { width: 100%; padding: 15px; margin-top: 10px; font-size: 16px; border-radius: 15px; border: 1px solid #ddd; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .sos { background: var(--red); color: white; font-weight: bold; }
        #status { color: var(--blue); font-weight: bold; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<header>
    <h2>BEK_BOLA</h2>
    <p>Parkent tumani yordamchisi</p>
</header>

<div class="container">
    <select id="langSelect">
        <option value="uz">O‘zbekcha</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>

    <div id="status">⏳ Aniqlanmoqda, kuting...</div>

    <button onclick="getLocation()" style="background: var(--blue); color: white;">📍 Mening joylashuvim</button>

    <div class="grid">
        <div class="card sos" onclick="sendAlert('SOS')">🆘<br>SOS</div>
        <div class="card" onclick="sendAlert('TEZ_YORDAM')" style="border: 2px solid var(--blue);">🚑<br>Tez yordam</div>
        <div class="card" onclick="openSearch('gas+station')">⛽️<br>Yoqilg‘i</div>
        <div class="card" onclick="openSearch('toilet')">🚻<br>Hojatxona</div>
        <div class="card" onclick="openSearch('restaurant')">🍽<br>Ovqatlanish</div>
        <div class="card" onclick="alert('Yaqinda ishga tushadi')">🎙<br>Yordam</div>
    </div>
</div>

<script>
    const dbURL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app";

    function showStatus(show) {
        document.getElementById('status').style.display = show ? 'block' : 'none';
    }

    async function sendAlert(type) {
        showStatus(true);
        if (!navigator.geolocation) { alert("GPS ishlamayapti"); return; }

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const payload = { type, lat, lon, time: new Date().toLocaleString() };

            try {
                await fetch(`${dbURL}/alerts.json`, { method: 'POST', body: JSON.stringify(payload) });
                showStatus(false);
                alert("Murojaat yuborildi! Yordam yo'lda.");
                if(type === 'TEZ_YORDAM') window.location.href = "tel:103";
            } catch(e) { alert("Xatolik! Internetni tekshiring."); showStatus(false); }
        }, () => { alert("Iltimos, GPS ruxsatini yoqing!"); showStatus(false); }, {enableHighAccuracy: true});
    }

    function getLocation() {
        showStatus(true);
        navigator.geolocation.getCurrentPosition(pos => {
            showStatus(false);
            window.location.href = `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`;
        }, () => { alert("Lokatsiya aniqlanmadi!"); showStatus(false); });
    }

    function openSearch(q) {
        showStatus(true);
        navigator.geolocation.getCurrentPosition(pos => {
            showStatus(false);
            window.location.href = `https://www.google.com{q}/@${pos.coords.latitude},${pos.coords.longitude},15z`;
        }, () => {
            showStatus(false);
            window.location.href = `https://www.google.com{q}+Parkent`;
        });
    }
</script>
</body>
</html>
