<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkent Tourist Helper</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main-bg: #121212; --card-bg: rgba(255, 255, 255, 0.1); --accent: #00d2ff; }
        body { font-family: 'Inter', sans-serif; background: var(--main-bg); color: white; margin: 0; padding: 0; }
        .glass-header { backdrop-filter: blur(10px); background: rgba(0,0,0,0.7); padding: 20px; position: sticky; top: 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .main-btn { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            padding: 25px 10px; display: flex; flex-direction: column; align-items: center; 
            backdrop-filter: blur(5px); transition: 0.3s; cursor: pointer;
        }
        .main-btn:active { transform: scale(0.9); background: var(--accent); }
        .main-btn span { font-size: 40px; margin-bottom: 10px; }
        .main-btn h2 { font-size: 14px; margin: 0; font-weight: 400; text-transform: uppercase; }
        .sos-btn { grid-column: span 2; background: linear-gradient(45deg, #ff416c, #ff4b2b); border: none; }
        .sos-btn h2 { font-weight: bold; font-size: 20px; }
        #status-bar { font-size: 12px; text-align: center; color: var(--accent); margin-top: 10px; }
    </style>
</head>
<body>

<div class="glass-header">
    <h2 id="app-title">PARKENT HELPER</h2>
    <select id="langSwitcher" onchange="changeLang()" style="background:none; color:white; border:1px solid white; border-radius:5px;">
        <option value="uz">UZ</option>
        <option value="ru">RU</option>
        <option value="en">EN</option>
    </select>
</div>

<div id="status-bar">● GPS Ready</div>

<div class="grid-container">
    <div class="main-btn sos-btn" onclick="triggerSignal('SOS')">
        <span>🆘</span> <h2 id="btn-sos">SOS</h2>
    </div>
    <div class="main-btn" onclick="triggerSignal('Medical')">
        <span>🚑</span> <h2 id="btn-med">Tez yordam</h2>
    </div>
    <div class="main-btn" onclick="triggerSignal('Fuel')">
        <span>⛽️</span> <h2 id="btn-fuel">Yoqilg'i</h2>
    </div>
    <div class="main-btn" onclick="triggerSignal('WC')">
        <span>🚻</span> <h2 id="btn-wc">Hojatxona</h2>
    </div>
    <div class="main-btn" onclick="triggerSignal('Food')">
        <span>🍽</span> <h2 id="btn-food">Ovqatlanish</h2>
    </div>
    <div class="main-btn" onclick="triggerSignal('Voice')">
        <span>🎙</span> <h2 id="btn-voice">Ovozli yordam</h2>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwhY9eF8gIO5Ew9MaYmzSbfKUs0wByOAM",
        authDomain: "bek-bola.firebaseapp.com",
        databaseURL: "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "bek-bola",
        appId: "1:617804928629:web:4402d65810cf3d30810a3c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const dictionary = {
        uz: { sos: "SOS", med: "Tez yordam", fuel: "Yoqilg'i", wc: "Hojatxona", food: "Ovqatlanish", voice: "Ovozli yordam" },
        ru: { sos: "ПОМОЩЬ", med: "Медпомощь", fuel: "Заправка", wc: "Туалет", food: "Еда", voice: "Голос" },
        en: { sos: "SOS", med: "Medical", fuel: "Fuel", wc: "Restroom", food: "Food", voice: "Voice help" }
    };

    function changeLang() {
        const lang = document.getElementById('langSwitcher').value;
        document.getElementById('btn-sos').innerText = dictionary[lang].sos;
        document.getElementById('btn-med').innerText = dictionary[lang].med;
        document.getElementById('btn-fuel').innerText = dictionary[lang].fuel;
        document.getElementById('btn-wc').innerText = dictionary[lang].wc;
        document.getElementById('btn-food').innerText = dictionary[lang].food;
        document.getElementById('btn-voice').innerText = dictionary[lang].voice;
    }

    function triggerSignal(type) {
        document.getElementById('status-bar').innerText = "Sending...";
        
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const signal = {
                    type: type,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    time: new Date().toLocaleTimeString(),
                    device: navigator.userAgent.slice(0, 20)
                };
                db.ref('alerts/').push(signal).then(() => {
                    document.getElementById('status-bar').innerText = "✅ Signal Sent!";
                    setTimeout(() => { document.getElementById('status-bar').innerText = "● GPS Ready"; }, 3000);
                });
            },
            (err) => { alert("GPS Xatosi: Joylashuvni yoqing!"); },
            { enableHighAccuracy: true }
        );
    }
</script>
</body>
</html>
