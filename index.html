<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEK_BOLA | Parkent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-user-select: none; user-select: none; transition: all 0.5s ease; }
        .bg-dynamic { background-size: cover; background-position: center; transition: background 1s ease-in-out; }
        .glass { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .dark .glass { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-dynamic min-h-screen flex flex-col text-slate-900 dark:text-white overflow-x-hidden">

    <div class="p-4 flex justify-between items-center max-w-md mx-auto w-full">
        <div class="glass px-4 py-2 rounded-2xl flex items-center gap-3 text-sm font-bold">
            <span id="w-temp">--°C</span>
            <span class="opacity-30">|</span>
            <span id="clock" class="font-mono text-blue-600 dark:text-blue-400">00:00:00</span>
        </div>
        <button onclick="toggleTheme()" class="glass p-2 rounded-xl">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <header class="text-center py-6">
        <h1 class="text-4xl font-black tracking-tighter text-white drop-shadow-lg">BEK_BOLA</h1>
        <p class="text-white text-[10px] font-bold uppercase tracking-[0.3em] opacity-80">Parkent Hokimligi</p>
    </header>

    <main class="p-6 max-w-md mx-auto w-full space-y-6 flex-grow">
        <button onclick="myLocation()" class="glass w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 btn-active">
            📍 <span id="t-loc">Joylashuvni aniqlash</span>
        </button>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="triggerAlert('SOS')" class="bg-red-600/90 text-white p-8 rounded-[40px] text-center shadow-xl btn-active cursor-pointer">
                <span class="text-4xl block mb-2">🆘</span>
                <b class="text-lg font-black uppercase tracking-widest">SOS</b>
            </div>
            <div onclick="triggerAlert('TEZ_YORDAM')" class="glass p-8 rounded-[40px] text-center border-2 border-blue-500 shadow-lg btn-active cursor-pointer">
                <span class="text-4xl block mb-2">🚑</span>
                <b id="t-amb" class="text-xs font-black uppercase">Tez Yordam</b>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="findNear('gas+station')" class="glass p-5 rounded-3xl text-center btn-active cursor-pointer">
                <span class="text-2xl">⛽️</span>
                <p id="t-fuel" class="text-[10px] font-bold mt-2 uppercase opacity-70">Yoqilg'i</p>
            </div>
            <div onclick="findNear('restaurant')" class="glass p-5 rounded-3xl text-center btn-active cursor-pointer">
                <span class="text-2xl">🍽</span>
                <p id="t-food" class="text-[10px] font-bold mt-2 uppercase opacity-70">Ovqatlanish</p>
            </div>
            <div onclick="comingSoon()" class="glass p-5 rounded-3xl text-center opacity-50 btn-active cursor-pointer">
                <span class="text-2xl">🚻</span>
                <p id="t-wc" class="text-[10px] font-bold mt-2 uppercase">Hojatxona</p>
            </div>
            <div onclick="comingSoon()" class="glass p-5 rounded-3xl text-center opacity-50 btn-active cursor-pointer">
                <span class="text-2xl">🎙</span>
                <p id="t-voice" class="text-[10px] font-bold mt-2 uppercase">Yordamchi</p>
            </div>
        </div>
    </main>

    <script>
        const FIREBASE_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";
        
        // Background changer
        const bgs = [
            'https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=1920',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=1920',
            'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1920'
        ];
        document.body.style.backgroundImage = `url('${bgs[Math.floor(Math.random() * bgs.length)]}')`;

        // Clock & Weather
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('uz-UZ');
        }, 1000);

        async function getWeather() {
            try {
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=41.29&longitude=69.83&current_weather=true");
                const data = await res.json();
                document.getElementById('w-temp').innerText = Math.round(data.current_weather.temperature) + "°C";
            } catch (e) { }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        async function triggerAlert(type) {
            if (!confirm("Tasdiqlaysizmi?")) return;
            navigator.geolocation.getCurrentPosition(async (p) => {
                const payload = { type, lat: p.coords.latitude, lon: p.coords.longitude, time: new Date().toLocaleString(), timestamp: Date.now() };
                await fetch(FIREBASE_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("✅ Yuborildi");
            }, null, { enableHighAccuracy: true });
        }

        function myLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                window.location.href = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            });
        }
        
        getWeather();
    </script>
</body>
</html>
