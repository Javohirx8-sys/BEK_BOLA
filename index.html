<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA | Parkent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sos-btn { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 64, 64, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(239, 64, 64, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 64, 64, 0); } }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <header class="bg-blue-600 p-6 text-white text-center rounded-b-3xl shadow-lg">
        <h1 class="text-2xl font-black">BEK_BOLA</h1>
        <p class="text-sm opacity-80">Parkent tumani aqlli yordamchisi</p>
    </header>

    <div class="p-6 max-w-md mx-auto">
        <select id="langSelect" onchange="applyLang()" class="w-full p-4 bg-white border rounded-2xl mb-4 font-bold">
            <option value="uz text-lg">🇺🇿 O'zbekcha</option>
            <option value="ru">🇷🇺 Русский</option>
        </select>

        <div id="status" class="hidden bg-yellow-100 text-yellow-700 p-3 rounded-xl text-center mb-4 font-bold">⏳ Yuborilmoqda...</div>

        <button onclick="myLocation()" class="w-full bg-white border-2 border-blue-600 text-blue-600 p-4 rounded-2xl font-bold mb-6 active:scale-95 transition">📍 Mening joylashuvim</button>

        <div class="grid grid-cols-2 gap-4">
            <div onclick="triggerAlert('SOS')" class="sos-btn bg-red-600 text-white p-8 rounded-3xl text-center cursor-pointer active:scale-90 transition">
                <span class="text-4xl">🆘</span><br><b class="text-xl">SOS</b>
            </div>
            <div onclick="triggerAlert('TEZ_YORDAM')" class="bg-white border-4 border-blue-600 text-blue-600 p-8 rounded-3xl text-center cursor-pointer active:scale-90 transition">
                <span class="text-4xl">🚑</span><br><b>TEZ YORDAM</b>
            </div>
            <div onclick="findNear('gas+station')" class="bg-white p-6 rounded-3xl text-center shadow-sm border active:scale-95 transition">
                <span class="text-3xl">⛽️</span><br><span>Yoqilg'i</span>
            </div>
            <div onclick="findNear('restaurant')" class="bg-white p-6 rounded-3xl text-center shadow-sm border active:scale-95 transition">
                <span class="text-3xl">🍽</span><br><span>Ovqatlanish</span>
            </div>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app/murojaatlar.json";

        async function triggerAlert(type) {
            if (!confirm("Yordam so'rashni tasdiqlaysizmi?")) return;
            document.getElementById("status").classList.remove("hidden");

            navigator.geolocation.getCurrentPosition(async (p) => {
                const payload = {
                    type: type,
                    lat: p.coords.latitude,
                    lon: p.coords.longitude,
                    time: new Date().toLocaleString()
                };

                try {
                    const res = await fetch(FIREBASE_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'application/json' }
                    });

                    if (res.ok) {
                        alert("Xabar yuborildi! Tez orada yordam ko'rsatiladi.");
                        if (type === 'TEZ_YORDAM') window.location.href = "tel:103";
                    } else {
                        alert("Xatolik: Bazaga ulanib bo'lmadi.");
                    }
                } catch (e) {
                    alert("Internet xatosi! Tarmoqni tekshiring.");
                } finally {
                    document.getElementById("status").classList.add("hidden");
                }
            }, () => {
                alert("GPS ruxsati berilmagan!");
                document.getElementById("status").classList.add("hidden");
            }, { enableHighAccuracy: true });
        }

        function myLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                window.location.href = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
            });
        }

        function findNear(query) {
            navigator.geolocation.getCurrentPosition(p => {
                window.location.href = `https://www.google.com/maps/search/${query}/@${p.coords.latitude},${p.coords.longitude},15z`;
            }, () => {
                window.location.href = `https://www.google.com/maps/search/${query}+Parkent`;
            });
        }
    </script>
</body>
</html>
