<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEK_BOLA | Parkent Smart City</title>
    <style>
        :root { --blue: #0a5cff; --red: #ff3b3b; --bg: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        header { background: linear-gradient(135deg, var(--blue), #0041c2); color: white; padding: 25px; text-align: center; border-bottom-right-radius: 30px; border-bottom-left-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        select, button { width: 100%; padding: 15px; margin-top: 10px; font-size: 16px; border-radius: 15px; border: 1px solid #ddd; outline: none; cursor: pointer; }
        button { background: var(--blue); color: white; border: none; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px 10px; text-align: center; box-shadow: 0 5px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .card:active { transform: scale(0.9); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 59, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 59, 0); } }
        .sos { background: var(--red); color: white; animation: pulse 2s infinite; }
    </style>
</head>
<body>

<header>
    <h2 id="h-title">BEK_BOLA</h2>
    <p id="h-sub">Parkent tumani aqlli yordamchisi</p>
</header>

<div class="container">
    <select id="langSelect" onchange="changeLang()">
        <option value="uz">O‘zbekcha</option>
        <option value="ru">Русский</option>
        <option value="en">English</option>
    </select>

    <button id="btn-loc" onclick="getLocation()">📍 Joylashuvni aniqlash</button>

    <div class="grid">
        <div class="card sos" onclick="sendAlert('SOS')">🆘<br><b id="l-sos">SOS</b></div>
        <div class="card" onclick="sendAlert('TEZ_YORDAM')">🚑<br><b id="l-amb">Tez yordam</b></div>
        <div class="card" onclick="openMap('zapravka+Parkent')">⛽️<br><span id="l-fuel">Yoqilg‘i</span></div>
        <div class="card" onclick="openMap('toilet+Parkent')">🚻<br><span id="l-wc">Hojatxona</span></div>
        <div class="card" onclick="openMap('restaurant+Parkent')">🍽<br><span id="l-food">Ovqatlanish</span></div>
        <div class="card" onclick="speak()">🎙<br><span id="l-voice">Ovozli yordam</span></div>
    </div>
</div>

<script>
    const dbURL = "https://bek-bola-default-rtdb.europe-west1.firebasedatabase.app";

    async function sendAlert(type) {
        if (!navigator.geolocation) return alert("GPS xatosi");
        navigator.geolocation.getCurrentPosition(async pos => {
            const payload = { type, lat: pos.coords.latitude, lon: pos.coords.longitude, time: new Date().toLocaleString() };
            try {
                const res = await fetch(`${dbURL}/alerts.json`, { method: 'POST', body: JSON.stringify(payload) });
                if(res.ok) alert("Xabar dispetcherga yuborildi!");
                if(type === 'TEZ_YORDAM') window.location.assign("tel:103");
            } catch(e) { alert("Xatolik! Internetni tekshiring."); }
        }, err => alert("GPS ruxsat berilmadi!"));
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            const url = "https://www.google.com" + pos.coords.latitude + "," + pos.coords.longitude;
            window.location.assign(url);
        });
    }

    function openMap(q) { 
        const url = "https://www.google.com" + q;
        window.location.assign(url); 
    }

    const langData = {
        uz: { title: "BEK_BOLA", sub: "Parkent tumani aqlli yordamchisi", loc: "📍 Joylashuvni aniqlash", sos: "SOS", amb: "Tez yordam", fuel: "Yoqilg‘i", wc: "Hojatxona", food: "Ovqatlanish", voice: "Ovozli yordam" },
        ru: { title: "БЕК_БОЛА", sub: "Помощник Паркента", loc: "📍 Определить локацию", sos: "SOS", amb: "Скорая помощь", fuel: "Заправка", wc: "Туалет", food: "Питание", voice: "Голосовой помощник" },
        en: { title: "BEK_BOLA", sub: "Parkent Smart Assistant", loc: "📍 Get Location", sos: "SOS", amb: "Ambulance", fuel: "Fuel", wc: "Toilet", food: "Food", voice: "Voice Help" }
    };

    function changeLang() {
        const l = langData[document.getElementById("langSelect").value];
        document.getElementById("h-title").innerText = l.title;
        document.getElementById("h-sub").innerText = l.sub;
        document.getElementById("btn-loc").innerText = l.loc;
        document.getElementById("l-sos").innerText = l.sos;
        document.getElementById("l-amb").innerText = l.amb;
        document.getElementById("l-fuel").innerText = l.fuel;
        document.getElementById("l-wc").innerText = l.wc;
        document.getElementById("l-food").innerText = l.food;
        document.getElementById("l-voice").innerText = l.voice;
    }
</script>
</body>
</html>
